---
- name: Set up Google Authenticator in PAM
  hosts: all
  become: true
  gather_facts: false
  
  vars:
    key_path: "{{ lookup('env', 'PWD') }}/gauthtest_ed25519"

  tasks:
    - name: Install the libpam-google-authenticator package
      apt:
        name: "libpam-google-authenticator"
        update_cache: yes
        state: present

    - name: Disable password authentication for SSH
      lineinfile:
        dest: "/etc/pam.d/sshd"
        regex: "@include common-auth"
        line: "#@include common-auth"

    - name: Configure PAM to use GoogleAuthenticator for SSH logins
      lineinfile:
        dest: "/etc/pam.d/sshd"
        line: "auth required pam_google_authenticator.so nullok"

    - name: Set ChallengeResponseAuthentication to Yes
      lineinfile:
        dest: "/etc/ssh/sshd_config"
        regexp: "^ChallengeResponseAuthentication (yes|no)"
        line: "ChallengeResponseAuthentication yes"
        state: present

    - name: Set PasswordAuthentication to no
      lineinfile:
        dest: "/etc/ssh/sshd_config"
        regexp: "^#PasswordAuthentication (yes|no)"
        line: "PasswordAuthentication no"
        state: present

    - name: Set KbdInteractiveAuthentication to Yes
      lineinfile:
        dest: "/etc/ssh/sshd_config"
        regexp: "^KbdInteractiveAuthentication (yes|no)"
        line: "KbdInteractiveAuthentication yes"
        state: present

    - name: Create a user (other than vagrant) to test Google Authenticator
      user:
       name: gauthtest
       shell: /bin/bash

    - name: Generate ed25519 SSH keypair in current directory
      community.crypto.openssh_keypair:
        path: "{{ key_path }}"
        type: ed25519
        comment: "gauthtest@github-lab"
        mode: "0600"
      delegate_to: localhost
      become: false
      
    - name: Add generated public key to gauthtest authorized_keys
      ansible.posix.authorized_key:
        user: gauthtest
        state: present
        key: "{{ lookup('file', key_path ~ '.pub') }}"

    - name: restart ssh daemon
      service:
        name: ssh
        state: restarted

    - name: Show post-playbook manual steps to configure google authenticator
      debug:
        msg: "{{ item }}"
      loop:
        - ";;;;; NEXT STEPS ;;;;"
        - "0. Log in to the VM as vagrant - specifying the SSH key: ssh -p 2222 -i gauthtest_ed25519 gauthtest@127.0.0.1"
        - "1. Become the gauthtest user: sudo su - gauthtest"
        - "2. Run google-authenticator as gauthtest user: google-authenticator"
        - "3. Follow the prompts and scan the QR code in the Google Authenticator App on your phone"
        - "4. Answer remaining questions"
        - "5. Log out of the VM"
        - "6. Log in as gauthtest user"
        - "7. See prompt for Google Authenticator code"
        - "8. Use code from app on your phone."
        - "9. Congratulations!"

